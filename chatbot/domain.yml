version: "3.1"

intents:
  - greet
  - elegir_opcion
  - preguntar_becas
  - preguntar_comedor
  - preguntar_deportes
  - salir_menu
  - out_of_scope

entities:
  - numero_opcion

slots:
  numero_opcion:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: numero_opcion

  modo_conversacion:
    type: text
    influence_conversation: true
    initial_value: "menu"
    mappings: []

  # ⭐️ SLOTS AGREGADOS (Solucionan el error 'non existent slot')
  contexto_menu:
    type: text
    # Este slot rastrea en qué menú (principal, becas, deportes) está el usuario.
    influence_conversation: true 
    initial_value: "principal" # Asumimos que inicia en el principal
    mappings: []

  texto_opcion:
    type: text
    # Este slot almacena el texto ingresado en modo libre
    influence_conversation: false
    mappings: []

forms:
  menu_form:
    required_slots:
      - numero_opcion

responses:
  utter_menu_principal:
    - text: |
        👋 ¡Bienvenido! Por favor, elegí una opción:
        1️⃣ Becas  
        2️⃣ Deportes  
        3️⃣ Comedor  
        4️⃣ Salir

  utter_menu_becas:
    - text: |
        📚 Sección Becas:
        1️⃣ Requisitos  
        2️⃣ Fechas  
        3️⃣ Volver al menú principal

  utter_menu_deportes:
    - text: |
        🏀 Sección Deportes:
        1️⃣ Horarios  
        2️⃣ Lugares  
        3️⃣ Volver al menú principal

  utter_menu_comedor:
    - text: |
        🍽️ Sección Comedor:
        1️⃣ Menú semanal  
        2️⃣ Precios  
        3️⃣ Volver al menú principal

  # ⭐️ RESPUESTAS DE SUBMENÚS (Se deben agregar al domain para ser invocadas por action_manejar_menu)
  utter_respuesta_requisitos_becas:
    - text: "Los requisitos de beca son: ser estudiante regular y tener promedio superior a 6."
  utter_respuesta_fechas_becas:
    - text: "Las becas se solicitan del 1 al 15 de marzo de cada año."
  utter_respuesta_horarios_deportes:
    - text: "Los horarios de entrenamiento están disponibles en la cartelera digital."
  utter_respuesta_lugares_deportes:
    - text: "Las actividades se realizan en el Campus Deportivo Universitario (CDU)."
  utter_respuesta_menu_comedor:
    - text: "El menú semanal se publica todos los lunes en la página web oficial."
  utter_respuesta_precios_comedor:
    - text: "El precio del menú completo es de $2500 para estudiantes."
  
  # RESPUESTAS PARA MODO LIBRE
  utter_respuesta_becas:
    - text: "Las becas se otorgan a estudiantes regulares con promedio mayor a 6 y sin materias previas pendientes."

  utter_respuesta_comedor:
    - text: "El comedor abre de lunes a viernes de 12 a 14 hs."

  utter_respuesta_deportes:
    - text: "Los entrenamientos de fútbol son lunes y miércoles a las 18 hs."

  utter_salir:
    - text: "👋 ¡Gracias por usar el asistente! Podés escribir cualquier pregunta si querés seguir chateando."

  utter_modo_libre:
    - text: "Estoy en modo conversación libre. Podés hacerme cualquier pregunta 😊"
    
  utter_fallback:
    - text: "Disculpa, no entendí tu solicitud. Por favor, elegí un número de las opciones del menú actual, o haceme una pregunta específica."

# ⭐️ ACTIONS PERSONALIZADAS AGREGADAS
actions:
  - action_manejar_menu
  - action_detectar_modo
  - action_responder_modo_libre # ¡Esta acción era esencial y faltaba!