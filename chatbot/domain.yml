entities:
  - numero_opcion

slots:
  numero_opcion:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: numero_opcion
      - type: from_text
        intent: elegir_opcion

  modo_conversacion:
    type: text
    influence_conversation: true
    initial_value: "menu"
    mappings:
      - type: custom

  contexto_menu:
    type: text
    influence_conversation: true 
    initial_value: "principal"
    mappings:
      - type: custom

  pagina_menu:
    type: float
    influence_conversation: true
    initial_value: 1
    mappings:
      - type: custom

responses:
  utter_salir:
    - text: "👋 ¡Gracias por usar el asistente! Si necesitás algo más, escribí 'Hola'."
  utter_modo_libre:
    - text: "Entendido. Podés hacerme preguntas abiertas sobre Becas, Pasantías, Comedor, etc. 😊"

actions:
  - action_manejar_menu
  - action_detectar_modo
  - action_responder_modo_libre
  - action_reset_context_and_show_main_menu
  - action_mostrar_menu_actual