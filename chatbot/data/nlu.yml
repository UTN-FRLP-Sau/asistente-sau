version: "3.1"

nlu:

- intent: greet
  examples: |
    - hola
    - buen día
    - qué tal
    - buenas
    - hola, ¿cómo estás?

- intent: elegir_opcion
  examples: |
    - [1](numero_opcion)
    - [2](numero_opcion)
    - [3](numero_opcion)
    - [4](numero_opcion)
    - opción [1](numero_opcion)
    - [becas](numero_opcion:1)
    - quiero saber de [becas](numero_opcion:1)
    - [deportes](numero_opcion:2)
    - me interesa [comedor](numero_opcion:3)
    - [salir](numero_opcion:4)
    - [requisitos](numero_opcion:1)
    - [fechas](numero_opcion:2)
    - [horarios](numero_opcion:1)
    - [lugares](numero_opcion:2)
    - [menu semanal](numero_opcion:1)
    - [precios](numero_opcion:2)
    - [volver](numero_opcion:3)
    - [menu](numero_opcion:3)

- intent: preguntar_becas
  examples: |
    - ¿Cuándo abren las becas?
    - que becas hay
    - requisitos para becas
    - cómo me anoto en las becas
    - información sobre becas

- intent: preguntar_comedor
  examples: |
    - qué hay para comer hoy
    - cuánto cuesta el menú
    - información del menú semanal

- intent: preguntar_deportes
  examples: |
    - horarios de fútbol
    - dónde se entrena vóley
    - hay clases de básquet?
    - información de deportes
    - quiero saber los horarios de entrenamientos

- intent: salir_menu
  examples: |
    - chau
    - adios
    - terminar
    - salir del menu
    - finalizar
    
- intent: out_of_scope
  examples: |
    - contame un chiste
    - qué día es hoy
    - no entiendo
    - quiero hablar de otra cosa
    - cualquier cosa