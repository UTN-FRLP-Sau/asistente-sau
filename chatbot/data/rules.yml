version: "3.1"

rules:

- rule: Mostrar menu principal al inicio
  steps:
    - intent: greet
    - action: utter_menu_principal

# --- MODO MENÚ (Funciona para números y palabras clave entrenadas) ---
- rule: Detectar modo y manejar opciones
  steps:
    - intent: elegir_opcion 
    - action: action_detectar_modo 
    - action: action_manejar_menu

# --- MODO LIBRE (Preguntas que no son opciones de menú) ---
- rule: Responder preguntas de Becas
  steps:
    - intent: preguntar_becas
    - action: action_responder_modo_libre

- rule: Responder preguntas de Boleto Estudiantil
  steps:
    - intent: preguntar_boleto_estudiantil
    - action: action_responder_modo_libre

- rule: Responder preguntas de Deportes
  steps:
    - intent: preguntar_deportes
    - action: action_responder_modo_libre

- rule: Responder preguntas de Comedor
  steps:
    - intent: preguntar_comedor
    - action: action_responder_modo_libre

- rule: Responder preguntas de Bolsa de Trabajo
  steps:
    - intent: preguntar_bolsa_trabajo
    - action: action_responder_modo_libre

- rule: Responder preguntas de Pasantías
  steps:
    - intent: preguntar_pasantias
    - action: action_responder_modo_libre

- rule: Salir del menú
  steps:
    - intent: salir_menu
    - action: action_responder_modo_libre

# --- FALLBACK (La IA no entiende nada) ---
- rule: Fallback general (out_of_scope)
  steps:
    - intent: out_of_scope
    - action: action_responder_modo_libre