version: "3.1"

rules:

- rule: Mostrar menu principal al inicio
  steps:
    - intent: greet
    - action: action_reset_context_and_show_main_menu

# --- NAVEGACIÓN UNIVERSAL (VOLVER ATRÁS) ---
- rule: Manejar comando de volver a menu principal
  steps:
  - intent: volver_atras
  - action: action_reset_context_and_show_main_menu
  - action: action_listen

# --- FLUJO DINÁMICO DE MENÚS  ---
- rule: Ciclo de Menu Dinamico
  steps:
    - intent: elegir_opcion 
    - action: action_manejar_menu
    - action: action_mostrar_menu_actual
    - action: action_listen
    
# --- SALIDA DE LA CONVERSACIÓN (USANDO UTTER_SALIR) ---
- rule: Salir de la Conversación
  steps:
    - intent: salir_menu
    - action: utter_salir 

