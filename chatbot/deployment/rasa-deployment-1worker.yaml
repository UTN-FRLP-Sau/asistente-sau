apiVersion: apps/v1
kind: Deployment
metadata:
  name: rasa-1worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rasa
  template:
    metadata:
      labels:
        app: rasa
    spec:
      initContainers:
      - name: render-credentials
        image: alpine:3.18
        command:
          - sh
          - -c
          - |
            apk add --no-cache gettext && \
            echo "Checking env variables:" && \
            echo "TELEGRAM_TOKEN=$TELEGRAM_TOKEN" && \
            echo "TELEGRAM_BOT_USERNAME=$TELEGRAM_BOT_USERNAME" && \
            echo "TELEGRAM_WEBHOOK_URL=$TELEGRAM_WEBHOOK_URL" && \
            echo "Rendering credentials..." && \
            envsubst < /template/credentials.yml.template > /config/credentials.yml && \
            echo "Render finished." || sleep 3600
        env:
          - name: TELEGRAM_TOKEN
            valueFrom:
              secretKeyRef:
                name: telegram-secrets
                key: TELEGRAM_TOKEN
          - name: TELEGRAM_BOT_USERNAME
            valueFrom:
              secretKeyRef:
                name: telegram-secrets
                key: TELEGRAM_BOT_USERNAME
          - name: TELEGRAM_WEBHOOK_URL
            valueFrom:
              secretKeyRef:
                name: telegram-secrets
                key: TELEGRAM_WEBHOOK_URL
        volumeMounts:
          - name: config-volume
            mountPath: /config
          - name: rasa-credentials-template
            mountPath: /template
            readOnly: true

      containers:
      - name: rasa
        image: manuelmorullo/rasa-chatbot:latest
        args:
          - run
          - --enable-api
          - --cors
          - "*"
          - --credentials
          - /app/credentials.yml
          - --endpoints
          - /app/endpoints.yml
          - --debug
          - -m
          - /app/models
        ports:
          - containerPort: 5005
        env:
          - name: SANIC_WORKERS
            value: "1"
          - name: REDIS_URL
            value: "redis://redis-service:6379"
          - name: TELEGRAM_TOKEN
            valueFrom:
              secretKeyRef:
                name: telegram-secrets
                key: TELEGRAM_TOKEN
          - name: TELEGRAM_BOT_USERNAME
            valueFrom:
              secretKeyRef:
                name: telegram-secrets
                key: TELEGRAM_BOT_USERNAME
          - name: TELEGRAM_WEBHOOK_URL
            valueFrom:
              secretKeyRef:
                name: telegram-secrets
                key: TELEGRAM_WEBHOOK_URL
          - name: SANIC_NO_UVLOOP
            value: "true"
        resources:
          requests:
            cpu: "1"
            memory: "900Mi"
          limits:
            cpu: "1"
            memory: "900Mi"
        volumeMounts:
          - name: models-volume
            mountPath: /app/models
          - name: config-volume
            mountPath: /app/credentials.yml
            subPath: credentials.yml
          - name: rasa-endpoints-volume
            mountPath: /app/endpoints.yml
            subPath: endpoints.yml

      volumes:
        - name: models-volume
          hostPath:
            path: /home/manuel/asistente-sau/chatbot/models
            type: Directory
        - name: config-volume
          emptyDir: {}
        - name: rasa-credentials-template
          configMap:
            name: rasa-credentials-template-cm
        - name: rasa-endpoints-volume
          configMap:
            name: rasa-endpoints-cm

